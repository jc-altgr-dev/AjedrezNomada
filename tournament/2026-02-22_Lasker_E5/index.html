<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3er Torneo de Ajedrez en Rosa - Jugadoras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fffafb; }
        .font-title { font-family: 'Playfair Display', serif; }
        .pink-gradient { background: linear-gradient(135deg, #ff0080 0%, #ff85b2 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 133, 178, 0.2); }
        .nav-active { color: #ff0080; border-bottom: 2px solid #ff0080; }
        .modal-blur { backdrop-filter: blur(8px); }
        .row-hover:hover { background-color: #fff0f6; transform: scale(1.002); transition: all 0.2s; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="sticky top-0 z-50 bg-white shadow-sm border-b border-pink-100 px-4 md:px-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center h-20">
            <div class="flex items-center gap-3">
                <img src="logo.webp" alt="Logo" class="h-12 w-auto drop-shadow-sm">
                <h1 class="hidden md:block font-title italic font-bold text-xl text-pink-600">Ajedrez en Rosa</h1>
            </div>
            
            <div class="flex gap-4 md:gap-8 text-[10px] md:text-xs font-bold uppercase tracking-widest text-gray-400">
                <button class="hover:text-pink-400 transition-colors">Info</button>
                <button class="nav-active pb-1">Jugadoras</button>
                <button class="hover:text-pink-400 transition-colors opacity-50 cursor-not-allowed">Emparejamientos</button>
                <button class="hover:text-pink-400 transition-colors opacity-50 cursor-not-allowed">Clasificación</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-12">
        
        <header class="mb-12 text-center md:text-left">
            <h2 class="text-4xl font-title italic text-gray-800 mb-2">Listado de <span class="text-pink-600">Jugadoras</span></h2>
            <p class="text-gray-500 font-medium">Lista inicial por orden alfabético y categoría.</p>
        </header>

        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div class="relative w-full md:w-96">
                <input type="text" id="playerSearch" placeholder="Buscar por nombre o categoría..." 
                    class="w-full pl-12 pr-6 py-4 rounded-2xl border border-pink-100 focus:ring-4 focus:ring-pink-50 outline-none transition-all shadow-sm">
                <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-pink-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <div id="counter" class="bg-white px-8 py-4 rounded-2xl shadow-sm border border-pink-50 text-pink-600 font-bold italic">
                Cargando lista...
            </div>
        </div>

        <div class="glass-card rounded-[2rem] overflow-hidden shadow-2xl border-none">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="pink-gradient text-white text-[10px] uppercase tracking-[0.2em]">
                            <th class="py-6 px-8">N°</th>
                            <th class="py-6 px-8">Nombre Completo</th>
                            <th class="py-6 px-8">Elo / Fed</th>
                            <th class="py-6 px-8 text-center">Categoría</th>
                            <th class="py-6 px-8 text-right">Detalles</th>
                        </tr>
                    </thead>
                    <tbody id="playersList" class="divide-y divide-pink-50">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="detailsModal" class="fixed inset-0 z-[100] hidden modal-blur flex items-center justify-center p-4 bg-black/20">
        <div class="bg-white rounded-[2.5rem] w-full max-w-lg shadow-2xl overflow-hidden animate-slide-up">
            <div class="pink-gradient p-8 text-white relative">
                <button onclick="closeModal()" class="absolute top-6 right-6 text-white/70 hover:text-white transition-colors text-3xl font-light">&times;</button>
                <div id="m-cat-tag" class="inline-block px-3 py-1 bg-white/20 rounded-lg text-[10px] font-bold uppercase tracking-widest mb-4">CATEGORÍA</div>
                <h3 id="m-name" class="text-3xl font-title leading-tight">Nombre de la Jugadora</h3>
            </div>
            
            <div class="p-8 grid grid-cols-2 gap-6">
                <div class="space-y-1">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">ID FIDE</p>
                    <p id="m-fide-id" class="text-lg font-bold text-gray-700">-</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Elo Internacional</p>
                    <p id="m-fide-rtg" class="text-lg font-bold text-pink-600">-</p>
                </div>
                <div class="space-y-1 border-t border-gray-50 pt-4">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">ID Nacional</p>
                    <p id="m-nat-id" class="text-lg font-bold text-gray-700">-</p>
                </div>
                <div class="space-y-1 border-t border-gray-50 pt-4">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Elo Nacional</p>
                    <p id="m-nat-rtg" class="text-lg font-bold text-pink-600">-</p>
                </div>

                <div class="col-span-2 pt-6 flex flex-col gap-3">
                    <a id="fide-btn" target="_blank" class="w-full py-4 bg-blue-600 text-white rounded-2xl text-center font-bold text-sm shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">Ver Perfil FIDE</a>
                    <a id="lichess-btn" target="_blank" class="w-full py-4 bg-zinc-800 text-white rounded-2xl text-center font-bold text-sm shadow-lg shadow-zinc-200 hover:bg-zinc-900 transition-all">Ver en Lichess</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let playersData = [];

        // CARGA DESDE LA CARPETA /players/
        Papa.parse('players/Players.csv', {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                playersData = results.data;
                renderPlayers(playersData);
            }
        });

        function renderPlayers(data) {
            const list = document.getElementById('playersList');
            document.getElementById('counter').innerText = `TOTAL: ${data.length} Jugadoras`;
            
            list.innerHTML = data.map((p, index) => `
                <tr class="row-hover group cursor-pointer" onclick="openModal(${index})">
                    <td class="py-6 px-8 text-xs font-mono text-gray-400">${p.N}</td>
                    <td class="py-6 px-8 font-bold text-gray-800">${p.Name}</td>
                    <td class="py-6 px-8">
                        <div class="font-bold text-pink-600">${p.Rtg > 0 ? p.Rtg : 'S/R'}</div>
                        <div class="text-[10px] text-gray-400 font-bold uppercase">${p.Fed}</div>
                    </td>
                    <td class="py-6 px-8 text-center">
                        <span class="px-4 py-2 rounded-xl text-[10px] font-bold bg-pink-50 text-pink-500 uppercase italic">
                            ${p.Categoría}
                        </span>
                    </td>
                    <td class="py-6 px-8 text-right">
                        <button class="text-pink-200 group-hover:text-pink-500 transition-colors">
                            <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // BUSCADOR EN TIEMPO REAL
        document.getElementById('playerSearch').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = playersData.filter(p => 
                p.Name.toLowerCase().includes(val) || 
                p.Categoría.toLowerCase().includes(val)
            );
            renderPlayers(filtered);
        });

        // FUNCIONES DEL MODAL
        function openModal(idx) {
            const p = playersData[idx];
            document.getElementById('m-name').innerText = p.Name;
            document.getElementById('m-cat-tag').innerText = p.Categoría;
            document.getElementById('m-fide-id').innerText = p['ID FIDE'] != "0" ? p['ID FIDE'] : 'No disponible';
            document.getElementById('m-fide-rtg').innerText = p.FRtg != "0" ? p.FRtg : 'S/R';
            document.getElementById('m-nat-id').innerText = p['ID Nat'] != "0" ? p['ID Nat'] : 'S/I';
            document.getElementById('m-nat-rtg').innerText = p.NRtg != "0" ? p.NRtg : 'S/R';

            const fBtn = document.getElementById('fide-btn');
            const lBtn = document.getElementById('lichess-btn');

            if(p['ID FIDE'] && p['ID FIDE'] !== "0") {
                fBtn.href = `https://ratings.fide.com/profile/${p['ID FIDE']}`;
                lBtn.href = `https://lichess.org/fide/${p['ID FIDE']}`;
                fBtn.classList.remove('hidden');
                lBtn.classList.remove('hidden');
            } else {
                fBtn.classList.add('hidden');
                lBtn.classList.add('hidden');
            }

            document.getElementById('detailsModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.add('hidden');
        }

        window.onclick = function(e) {
            if (e.target == document.getElementById('detailsModal')) closeModal();
        }
    </script>
</body>
</html>
