<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3er Torneo de Ajedrez en Rosa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fffafb; overflow-x: hidden; }
        .font-title { font-family: 'Playfair Display', serif; }
        .pink-gradient { background: linear-gradient(135deg, #ff0080 0%, #ff85b2 100%); }
        
        /* Menú Sandwich Elegante */
        .sandwich-line { background-color: #ff0080; height: 2px; border-radius: 2px; transition: 0.3s; margin-left: auto; }
        .line-1 { width: 28px; }
        .line-2 { width: 20px; margin-top: 6px; }
        .line-3 { width: 12px; margin-top: 6px; }

        /* Estilos de Tabla y Modal */
        .glass-card { background: rgba(255, 255, 255, 0.98); border: 1px solid rgba(255, 133, 178, 0.1); }
        .row-hover:hover { background-color: #fff0f6; }
        .avatar-frame { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; border: 3px solid white; box-shadow: 0 10px 20px rgba(255, 0, 128, 0.1); }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-list { animation: slideIn 0.4s ease forwards; }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-white border-b border-pink-50 relative">
        <div class="max-w-7xl mx-auto flex flex-col items-center py-6 px-4">
            <img src="logo.webp" alt="Torneo Ajedrez en Rosa" class="w-full max-w-[400px] h-auto cursor-pointer" onclick="location.reload()">
            
            <button onclick="toggleMenu()" class="absolute right-6 top-1/2 -translate-y-1/2 p-2 hover:opacity-70 transition-all z-50">
                <div class="sandwich-line line-1"></div>
                <div class="sandwich-line line-2"></div>
                <div class="sandwich-line line-3"></div>
            </button>
        </div>

        <div id="navMenu" class="hidden absolute top-full left-0 w-full bg-white/95 backdrop-blur-md shadow-2xl z-[100] border-t border-pink-50">
            <div class="max-w-lg mx-auto py-8 flex flex-col gap-6 text-center font-bold uppercase tracking-[0.2em] text-sm text-gray-500">
                <a href="#" class="hover:text-pink-600 transition-colors">Info</a>
                <a href="#" class="text-pink-600 border-b-2 border-pink-600 w-fit mx-auto pb-1">Jugadoras</a>
                <a href="#" class="opacity-40 pointer-events-none">Emparejamientos</a>
                <a href="#" class="opacity-40 pointer-events-none">Clasificación</a>
                <a href="#" class="hover:text-pink-600 transition-colors">Galería</a>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <h2 class="text-2xl font-title italic text-pink-600 uppercase tracking-widest">Lista de Competidoras</h2>
            <div class="relative w-full md:w-80">
                <input type="text" id="playerSearch" placeholder="Buscar jugadora..." 
                    class="w-full px-6 py-3 rounded-full border border-pink-100 focus:ring-2 focus:ring-pink-300 outline-none transition-all shadow-sm">
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] overflow-hidden shadow-xl border-none">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="pink-gradient text-white text-[10px] uppercase tracking-widest">
                            <th class="py-5 px-8">N°</th>
                            <th class="py-5 px-8">Nombre</th>
                            <th class="py-5 px-8 text-center">Categoría</th>
                            <th class="py-5 px-8 text-right">Ficha</th>
                        </tr>
                    </thead>
                    <tbody id="playersList" class="divide-y divide-pink-50">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="detailsModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-[3rem] w-full max-w-lg shadow-2xl overflow-hidden animate-list">
            <div class="pink-gradient p-10 text-white relative">
                <button onclick="closeModal()" class="absolute top-6 right-8 text-white/70 hover:text-white text-4xl font-light">&times;</button>
                
                <div class="flex items-center gap-6">
                    <img id="m-avatar" src="" alt="Avatar" class="avatar-frame bg-pink-100" onerror="this.src='https://via.placeholder.com/150?text=Avatar'">
                    <div>
                        <span id="m-cat-tag" class="text-[10px] font-bold uppercase tracking-widest opacity-80">CATEGORÍA</span>
                        <h3 id="m-name" class="text-2xl font-title leading-tight mt-1">Nombre</h3>
                    </div>
                </div>
            </div>
            
            <div class="p-10 space-y-8">
                <div class="grid grid-cols-2 gap-8">
                    <div class="space-y-1">
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">FIDE ID</p>
                        <p id="m-fide-id" class="text-lg font-bold text-gray-700">-</p>
                    </div>
                    <div class="space-y-1">
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Elo FIDE</p>
                        <p id="m-fide-rtg" class="text-lg font-bold text-pink-600">-</p>
                    </div>
                    <div class="space-y-1">
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">ID Nacional</p>
                        <p id="m-nat-id" class="text-lg font-bold text-gray-700">-</p>
                    </div>
                    <div class="space-y-1">
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Elo Nacional</p>
                        <p id="m-nat-rtg" class="text-lg font-bold text-pink-600">-</p>
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <a id="fide-btn" target="_blank" class="w-full py-4 bg-[#004a99] text-white rounded-2xl text-center font-bold text-xs uppercase tracking-widest hover:brightness-110 transition-all">Perfil Oficial FIDE</a>
                    <a id="lichess-btn" target="_blank" class="w-full py-4 bg-zinc-800 text-white rounded-2xl text-center font-bold text-xs uppercase tracking-widest hover:brightness-125 transition-all">Seguimiento Lichess</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let playersData = [];

        function toggleMenu() {
            const menu = document.getElementById('navMenu');
            menu.classList.toggle('hidden');
        }

        // CARGA CSV
        Papa.parse('players/Players.csv', {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                playersData = results.data;
                renderPlayers(playersData);
            }
        });

        function renderPlayers(data) {
            const list = document.getElementById('playersList');
            list.innerHTML = data.map((p, index) => `
                <tr class="row-hover group cursor-pointer" onclick="openModal(${playersData.indexOf(p)})">
                    <td class="py-5 px-8 text-xs font-mono text-gray-300">${p.N}</td>
                    <td class="py-5 px-8">
                        <div class="font-bold text-gray-700 group-hover:text-pink-600 transition-colors">${p.Name}</div>
                        <div class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">${p.Fed} | Elo: ${p.Rtg > 0 ? p.Rtg : 'S/R'}</div>
                    </td>
                    <td class="py-5 px-8 text-center">
                        <span class="px-3 py-1.5 rounded-lg text-[9px] font-bold bg-pink-50 text-pink-500 uppercase italic">
                            ${p.Categoría}
                        </span>
                    </td>
                    <td class="py-5 px-8 text-right">
                        <div class="w-8 h-8 rounded-full bg-pink-100 flex items-center justify-center text-pink-400 group-hover:bg-pink-600 group-hover:text-white transition-all ml-auto">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function openModal(idx) {
            const p = playersData[idx];
            document.getElementById('m-name').innerText = p.Name;
            document.getElementById('m-cat-tag').innerText = p.Categoría;
            document.getElementById('m-fide-id').innerText = p['ID FIDE'] != "0" ? p['ID FIDE'] : 'No asignado';
            document.getElementById('m-fide-rtg').innerText = p.FRtg != "0" ? p.FRtg : 'S/R';
            document.getElementById('m-nat-id').innerText = p['ID Nat'] != "0" ? p['ID Nat'] : 'S/I';
            document.getElementById('m-nat-rtg').innerText = p.NRtg != "0" ? p.NRtg : 'S/R';

            // Arreglo 4: Imagen del Avatar
            const avatarImg = document.getElementById('m-avatar');
            avatarImg.src = p.Avatars ? `Avatars/${p.Avatars}` : 'https://via.placeholder.com/150?text=Ajedrez';

            const fBtn = document.getElementById('fide-btn');
            const lBtn = document.getElementById('lichess-btn');

            if(p['ID FIDE'] && p['ID FIDE'] !== "0") {
                fBtn.href = `https://ratings.fide.com/profile/${p['ID FIDE']}`;
                
                // Arreglo 1: Estructura Lichess FIDE (Apellido_Nombre_etc)
                const urlName = p.Name.replace(/, /g, '_').replace(/ /g, '_');
                lBtn.href = `https://lichess.org/fide/${p['ID FIDE']}/${urlName}`;
                
                fBtn.style.display = 'block';
                lBtn.style.display = 'block';
            } else {
                fBtn.style.display = 'none';
                lBtn.style.display = 'none';
            }

            document.getElementById('detailsModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.add('hidden');
        }

        // Buscador
        document.getElementById('playerSearch').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = playersData.filter(p => p.Name.toLowerCase().includes(val) || p.Categoría.toLowerCase().includes(val));
            renderPlayers(filtered);
        });

        // Cerrar menú si se hace click fuera
        window.onclick = function(e) {
            if (e.target == document.getElementById('detailsModal')) closeModal();
        }
    </script>
</body>
</html>
