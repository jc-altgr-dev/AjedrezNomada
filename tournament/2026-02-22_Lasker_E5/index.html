<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3er Torneo de Ajedrez en Rosa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fff9fa; }
        .font-title { font-family: 'Playfair Display', serif; }
        .pink-gradient { background: linear-gradient(135deg, #ff0080 0%, #ff85b2 100%); }
        
        /* Arreglo 5: Sandwich con líneas desiguales */
        .sandwich-line { background-color: #ff0080; height: 2px; border-radius: 2px; transition: 0.3s; margin-left: auto; }
        .line-1 { width: 28px; }
        .line-2 { width: 20px; margin-top: 6px; }
        .line-3 { width: 12px; margin-top: 6px; }

        /* Arreglo 6: Estilo Galería Instagram */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 8px; }
        .gallery-item { aspect-ratio: 1 / 1; overflow: hidden; position: relative; cursor: pointer; border-radius: 4px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .gallery-item:hover img { transform: scale(1.1); }

        .active-tab { color: #ff0080; border-bottom: 2px solid #ff0080; }
        .hidden-section { display: none; }
        
        /* Estilo para Cuadro Cruzado */
        .crosstable-text { font-family: 'Courier New', Courier, monospace; font-size: 0.85rem; line-height: 1.4; white-space: pre; }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-white shadow-sm border-b border-pink-50 sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto flex items-center px-4 py-4">
            <div class="w-[90%] flex justify-center md:justify-start">
                <img src="logo.webp" alt="Logo" class="max-h-20 w-auto cursor-pointer" onclick="showSection('players')">
            </div>
            <div class="w-[10%] flex justify-end">
                <button onclick="toggleMenu()" class="p-2 hover:opacity-70 transition-all">
                    <div class="sandwich-line line-1"></div>
                    <div class="sandwich-line line-2"></div>
                    <div class="sandwich-line line-3"></div>
                </button>
            </div>
        </div>

        <div class="hidden md:flex justify-center border-t border-pink-50 bg-white/50">
            <div class="flex gap-10 py-4 text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
                <button onclick="showSection('players')" id="tab-players" class="active-tab transition-colors">Jugadoras</button>
                <button onclick="showSection('cuadro')" id="tab-cuadro" class="hover:text-pink-600 transition-colors">Cuadro Cruzado</button>
                <button onclick="showSection('galeria')" id="tab-galeria" class="hover:text-pink-600 transition-colors">Galería</button>
                <button class="opacity-30 cursor-not-allowed">Calendarización</button>
            </div>
        </div>

        <div id="navMenu" class="hidden absolute top-full left-0 w-full bg-white shadow-xl border-t border-pink-50">
            <div class="flex flex-col text-center font-bold uppercase tracking-widest text-xs py-6 gap-6 text-gray-500">
                <button onclick="showSection('players')">Jugadoras</button>
                <button onclick="showSection('cuadro')">Cuadro Cruzado</button>
                <button onclick="showSection('galeria')">Galería</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10">

        <section id="sec-players" class="animate-fade-in">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
                <h2 class="text-3xl font-title italic text-pink-600">Listado Inicial</h2>
                <input type="text" id="playerSearch" placeholder="Buscar jugadora..." 
                    class="w-full md:w-80 px-6 py-3 rounded-full border border-pink-100 outline-none focus:ring-2 focus:ring-pink-300 shadow-sm">
            </div>
            <div class="bg-white rounded-[2rem] overflow-hidden shadow-lg border border-pink-50">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="pink-gradient text-white text-[10px] uppercase tracking-wider">
                            <tr>
                                <th class="p-6">N°</th>
                                <th class="p-6">Jugadora / Elo</th>
                                <th class="p-6 text-center">Categoría</th>
                                <th class="p-6 text-right">Ficha</th>
                            </tr>
                        </thead>
                        <tbody id="playersList" class="divide-y divide-pink-50"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="sec-cuadro" class="hidden-section">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-title italic text-pink-600 mb-2">Resultados en Vivo</h2>
                <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Cuadro Cruzado - Ronda 5</p>
            </div>
            <div class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-xl border border-pink-50 overflow-x-auto">
                <div id="crosstable-content" class="crosstable-text text-gray-600 bg-pink-50/30 p-6 rounded-2xl">
                    Cargando resultados...
                </div>
            </div>
        </section>

        <section id="sec-galeria" class="hidden-section">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-title italic text-pink-600 mb-2">Galería Rosa</h2>
                <p class="text-gray-400 text-sm">Momentos capturados del torneo</p>
            </div>
            <div id="galleryGrid" class="gallery-grid">
                </div>
        </section>

    </main>

    <div id="detailsModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-[3rem] w-full max-w-lg shadow-2xl overflow-hidden">
            <div class="pink-gradient p-10 text-white relative">
                <button onclick="closeModal()" class="absolute top-6 right-8 text-white/70 hover:text-white text-4xl font-light">&times;</button>
                <div class="flex items-center gap-6">
                    <img id="m-avatar" src="" class="w-20 h-20 rounded-2xl object-cover border-2 border-white shadow-lg" onerror="this.src='https://via.placeholder.com/150?text=Chess'">
                    <div>
                        <span id="m-cat-tag" class="text-[10px] font-bold uppercase opacity-80">CATEGORÍA</span>
                        <h3 id="m-name" class="text-2xl font-title mt-1">Nombre</h3>
                    </div>
                </div>
            </div>
            <div class="p-10 space-y-6">
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div class="bg-gray-50 p-4 rounded-2xl"><p class="text-[9px] text-gray-400 font-bold uppercase">ID FIDE</p><p id="m-fide-id" class="font-bold">-</p></div>
                    <div class="bg-gray-50 p-4 rounded-2xl"><p class="text-[9px] text-gray-400 font-bold uppercase">Elo FIDE</p><p id="m-fide-rtg" class="font-bold text-pink-600">-</p></div>
                </div>
                <div class="flex flex-col gap-3">
                    <a id="fide-btn" target="_blank" class="w-full py-3 bg-[#004a99] text-white rounded-xl text-center font-bold text-xs uppercase tracking-widest">Perfil FIDE</a>
                    <a id="lichess-btn" target="_blank" class="w-full py-3 bg-zinc-800 text-white rounded-xl text-center font-bold text-xs uppercase tracking-widest">Lichess Tracking</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let playersData = [];

        // LÓGICA DE NAVEGACIÓN (SPA)
        function showSection(secId) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden-section'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            
            document.getElementById(`sec-${secId}`).classList.remove('hidden-section');
            const tab = document.getElementById(`tab-${secId}`);
            if(tab) tab.classList.add('active-tab');
            
            document.getElementById('navMenu').classList.add('hidden');
            window.scrollTo(0,0);

            // Cargas bajo demanda
            if(secId === 'cuadro') loadCrosstable();
            if(secId === 'galeria') loadGallery();
        }

        function toggleMenu() { document.getElementById('navMenu').classList.toggle('hidden'); }

        // CARGA JUGADORAS (Mantiene Arreglo 4)
        Papa.parse('players/Players.csv', {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                playersData = results.data;
                renderPlayers(playersData);
            }
        });

        function renderPlayers(data) {
            const list = document.getElementById('playersList');
            list.innerHTML = data.map((p, i) => `
                <tr class="hover:bg-pink-50 cursor-pointer" onclick="openModal(${playersData.indexOf(p)})">
                    <td class="p-6 text-xs text-gray-300 font-mono">${p.N}</td>
                    <td class="p-6">
                        <div class="font-bold text-gray-700">${p.Name}</div>
                        <div class="text-[9px] text-pink-400 uppercase font-bold">${p.Fed} | Elo: ${p.Rtg > 0 ? p.Rtg : 'S/R'}</div>
                    </td>
                    <td class="p-6 text-center">
                        <span class="px-3 py-1 bg-pink-50 text-pink-500 rounded-lg text-[9px] font-bold italic uppercase">${p.Categoría}</span>
                    </td>
                    <td class="p-6 text-right text-pink-200">
                        <svg class="w-5 h-5 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </td>
                </tr>
            `).join('');
        }

        // ARREGLO 7: CARGA CUADRO CRUZADO
        function loadCrosstable() {
            fetch('cuadro_cruzado.txt')
                .then(res => res.text())
                .then(text => {
                    document.getElementById('crosstable-content').innerText = text;
                })
                .catch(() => {
                    document.getElementById('crosstable-content').innerText = "Archivo de cuadro cruzado no encontrado.";
                });
        }

        // ARREGLO 6: CARGA GALERÍA
        function loadGallery() {
            Papa.parse('Galeria/galeria.csv', {
                download: true, header: false, skipEmptyLines: true,
                complete: function(results) {
                    const grid = document.getElementById('galleryGrid');
                    grid.innerHTML = results.data.map(row => `
                        <div class="gallery-item">
                            <img src="Galeria/${row[0]}" alt="Torneo" loading="lazy">
                        </div>
                    `).join('');
                }
            });
        }

        // ARREGLO 1 & 4: MODAL Y LICHESS
        function openModal(idx) {
            const p = playersData[idx];
            document.getElementById('m-name').innerText = p.Name;
            document.getElementById('m-cat-tag').innerText = p.Categoría;
            document.getElementById('m-fide-id').innerText = p['ID FIDE'] || '-';
            document.getElementById('m-fide-rtg').innerText = p.FRtg || 'S/R';
            document.getElementById('m-avatar').src = p.Avatars ? `Avatars/${p.Avatars}` : '';

            const lBtn = document.getElementById('lichess-btn');
            const fBtn = document.getElementById('fide-btn');

            if(p['ID FIDE'] && p['ID FIDE'] !== "0") {
                const urlName = p.Name.replace(/, /g, '_').replace(/ /g, '_');
                lBtn.href = `https://lichess.org/fide/${p['ID FIDE']}/${urlName}`;
                fBtn.href = `https://ratings.fide.com/profile/${p['ID FIDE']}`;
                lBtn.style.display = 'block'; fBtn.style.display = 'block';
            } else {
                lBtn.style.display = 'none'; fBtn.style.display = 'none';
            }
            document.getElementById('detailsModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('detailsModal').classList.add('hidden'); }
    </script>
</body>
</html>
